services:
  - type: web
    name: vrsphere-backend
    runtime: node
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: NODE_ENV
        value: production
      - key: CLIENT_URL
        value: https://vrsphere-frontend.onrender.com
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true

  - type: web
    name: vrsphere-frontend
    runtime: static
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: VITE_API_URL
        value: https://vrsphere-backend.onrender.com/api
      - key: VITE_SOCKET_URL
        value: https://vrsphere-backend.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
